<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Chat</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b141a;
  color:white;
}

.header {
  background:#202c33;
  padding:15px;
  font-size:18px;
  display:flex;
  justify-content:space-between;
}

.chat {
  height:75vh;
  overflow-y:auto;
  padding:10px;
}

.msg {
  background:#005c4b;
  padding:10px;
  margin:8px;
  border-radius:10px;
  max-width:70%;
}

.time {
  font-size:10px;
  opacity:0.7;
  margin-top:5px;
}

.inputBox {
  display:flex;
  padding:10px;
  background:#202c33;
}

input {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

button {
  margin-left:10px;
  padding:10px;
  background:#00a884;
  border:none;
  border-radius:20px;
  color:white;
}
</style>
</head>

<body>

<div class="header">
  My Chat
  <button onclick="clearChat()">Reset</button>
</div>

<div id="chat" class="chat"></div>

<div class="inputBox">
  <input id="msg" placeholder="Type message...">
  <button onclick="send()">Send</button>
</div>

<script>

// LOAD SAVED MESSAGES
let chatBox = document.getElementById("chat");
let messages = JSON.parse(localStorage.getItem("chat")) || [];

function render() {
  chatBox.innerHTML = "";
  messages.forEach(m => {
    chatBox.innerHTML += `
      <div class="msg">
        ${m.text}
        <div class="time">${m.time}</div>
      </div>
    `;
  });
  chatBox.scrollTop = chatBox.scrollHeight;
}

// SEND MESSAGE
function send() {
  let text = document.getElementById("msg").value;
  if(!text) return;

  let time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

  messages.push({text, time});
  localStorage.setItem("chat", JSON.stringify(messages));

  document.getElementById("msg").value = "";
  render();
}

// CLEAR CHAT
function clearChat() {
  if(confirm("Clear all messages?")) {
    localStorage.removeItem("chat");
    messages = [];
    render();
  }
}

// INITIAL LOAD
render();

</script>

</body>
</html>
