<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chat Mail</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b141a;
  color:white;
}

.header {
  background:#202c33;
  padding:15px;
  font-size:18px;
  text-align:center;
}

.chat {
  height:75vh;
  overflow-y:auto;
  padding:10px;
}

.msg {
  background:#005c4b;
  padding:10px;
  margin:8px;
  border-radius:10px;
  max-width:70%;
}

.inputBox {
  display:flex;
  padding:10px;
  background:#202c33;
  gap:5px;
}

input[type="text"] {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

input[type="file"] {
  color:white;
}

button {
  padding:10px 15px;
  background:#00a884;
  border:none;
  border-radius:20px;
  color:white;
}
</style>
</head>

<body>

<div class="header">Chat Mail</div>

<div id="chat" class="chat"></div>

<div class="inputBox">
  <input id="msg" placeholder="Type message...">
  <input type="file" id="file">
  <button onclick="send()">Send</button>
</div>

<script>

/* PASSWORD LOCK */
let password = prompt("Enter password:");
if(password !== "rahul123") {
  document.body.innerHTML = "Access Denied";
}

/* SEND FUNCTION */
async function send() {
  let text = document.getElementById("msg").value;
  let fileInput = document.getElementById("file");

  if(!text && !fileInput.files[0]) return;

  let formData = new FormData();
  formData.append("access_key", "8d0a2916-bb79-49de-8c37-6d7bab01d749");
  formData.append("subject", "Chat Mail Message");
  formData.append("from_name", "Rahul Chat");
  formData.append("message", text);
  formData.append("to", "jadhavkushmitha@gmail.com");

  if(fileInput.files[0]) {
    formData.append("file", fileInput.files[0]);
  }

  let res = await fetch("https://api.web3forms.com/submit", {
    method: "POST",
    body: formData
  });

  let data = await res.json();

  if(data.success) {
    document.getElementById("chat").innerHTML +=
      `<div class="msg">${text || "📎 File sent"}</div>`;
  } else {
    alert("Error: " + JSON.stringify(data));
  }

  document.getElementById("msg").value = "";
  fileInput.value = "";

  let chat = document.getElementById("chat");
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
